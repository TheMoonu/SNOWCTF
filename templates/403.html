<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - 访问被拒绝</title>
    <meta name="description" content="403,无权限访问">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: #f44336;
            line-height: 1;
            margin-bottom: 20px;
        }
        
        .error-title {
            font-size: 1.8rem;
            font-weight: 500;
            color: #333;
            margin-bottom: 15px;
        }
        
        .error-message {
            font-size: 1rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 30px;
            font-size: 15px;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.2s;
            display: inline-block;
        }
        
        .btn-primary {
            background: #f44336;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #d32f2f;
        }
        
        .btn-secondary {
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #fafafa;
        }
        
        @media (max-width: 600px) {
            .error-code {
                font-size: 5rem;
            }
            
            .error-title {
                font-size: 1.5rem;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">403</div>
        <h1 class="error-title">访问被拒绝</h1>
        <p class="error-message">
            抱歉，您没有权限访问此页面。
        </p>
        <div class="btn-group">
            <a href="/" class="btn btn-primary">返回首页</a>
            <a href="javascript:history.back();" class="btn btn-secondary">返回上页</a>
        </div>
    </div>
</body>
</html>

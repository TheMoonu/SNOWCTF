{% extends "account/base.html" %}

{% load i18n %}
{% block head_title %}密码修改成功{% endblock %}
{% block user_title %}密码修改成功{% endblock %}
{% block form_description %}您可以使用新密码登录了{% endblock %}

{% block content %}
    <div class="alert alert-success" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        您的密码已成功修改！
    </div>

    <div class="text-center mt-4">
        <a href="{% url 'account_login' %}" class="btn btn-primary" style="display: inline-flex; align-items: center; justify-content: center; min-width: 200px; height: 46px; text-decoration: none;">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            立即登录
        </a>
    </div>
{% endblock %}

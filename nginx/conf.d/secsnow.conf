# ==========================================
# SecSnow Nginx 配置文件
# ==========================================
# 说明：
# 1. server_name _ 是通配符，匹配所有域名
# 2. 如果使用具体域名，请将 _ 替换为您的域名
#    例如：server_name example.com www.example.com;
# 3. 修改域名后需要重启 Nginx：docker compose restart nginx
# ==========================================

upstream secsnow_backend {
    server web:8000;
    keepalive 32;
}

server {
    listen 80;
    # 默认监听所有域名，生产环境建议改为具体域名
    server_name _;

    #listen 443 ssl;
    #listen [::]:443 ssl;
    #http2 on;
    #server_name your-domain.com;
    # SSL 证书配置 您的ssl证书请放在/安装目录/nginx/ssl目录下
    #ssl_certificate /etc/nginx/ssl/cert.pem;
    #ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # SSL 配置
    #ssl_protocols TLSv1.2 TLSv1.3;
    #ssl_ciphers HIGH:!aNULL:!MD5;
    #ssl_prefer_server_ciphers on;
    #ssl_ciphers         EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    #ssl_session_cache   shared:SSL:10m;
    #ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    access_log /var/log/nginx/secsnow_access.log;
    error_log  /var/log/nginx/secsnow_error.log warn;

    client_max_body_size 500M;

    location /static/ {
        alias /usr/share/nginx/secsnow/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /usr/share/nginx/secsnow/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ================= SSE（流式响应） =================

    # Dashboard SSE
    location ~* ^/dashboard/sse/?$ {
        proxy_pass http://secsnow_backend;

        # 使用 $http_host 而不是 $host，避免传递 server_name 的 _ 值
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;

        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        chunked_transfer_encoding on;
        tcp_nodelay on;

        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }


    # ================= Django 普通请求 =================

    location / {
        proxy_pass http://secsnow_backend;

        # 使用 $http_host 而不是 $host，避免传递 server_name 的 _ 值
        # 如果没有 Host 头，则使用 $host
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ================= 健康检查 =================

    location /health/ {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }
}

<div class="card border-0 rounded-6 px-3 mb-2 mb-md-3">
    <div class="card-body px-2 py-3">
        {% if competition %}
            {% if competition_status == 'upcoming' %}
                <div class="comp-countdown-flex">
                    <span class="comp-status-badge">
                        <i class="fa fa-clock-o"></i> 即将开始
                    </span>
                    <div class="comp-timer-wrapper" data-start-time="{{ competition.start_time|date:'Y/m/d H:i:s' }}" title="距离比赛开始还有" data-toggle="tooltip" data-placement="top">
                        <span class="comp-time-group"><span class="comp-time-block days">02</span></span>
                        <span class="comp-time-group"><span class="comp-time-block hours">03</span></span>
                        <span class="comp-time-group"><span class="comp-time-block minutes">10</span></span>
                        <span class="comp-time-group"><span class="comp-time-block seconds">44</span></span>
                    </div>
                </div>
            {% elif competition_status == 'ongoing' %}
                <div class="comp-countdown-flex">
                    <span class="comp-status-badge comp-status-ongoing">
                        <i class="fa fa-play-circle"></i> 进行中
                    </span>
                    <div class="comp-timer-wrapper" data-end-time="{{ competition.end_time|date:'Y/m/d H:i:s' }}" title="距离比赛结束还有" data-toggle="tooltip" data-placement="top">
                        <span class="comp-time-group"><span class="comp-time-block days">02</span></span>
                        <span class="comp-time-group"><span class="comp-time-block hours">03</span></span>
                        <span class="comp-time-group"><span class="comp-time-block minutes">10</span></span>
                        <span class="comp-time-group"><span class="comp-time-block seconds">44</span></span>
                    </div>
                </div>
            {% else %}
                <div class="comp-countdown-flex">
                    <span class="comp-status-badge comp-status-ended">
                        <i class="fa fa-check-circle"></i> 比赛已结束
                    </span>
                </div>
            {% endif %}
        {% else %}
            <div class="text-center text-muted py-2">
                暂无比赛信息
            </div>
        {% endif %}
    </div>
</div>

<style>
.comp-countdown-flex {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

.comp-status-badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    background-color: #edf2ff;
    color: #4263eb;
}

.comp-status-badge.comp-status-ongoing {
    background-color: #e6fcf5;
    color: #12b886;
}

.comp-status-badge.comp-status-ended {
    background-color: #f1f3f5;
    color: #495057;
}

.comp-timer-wrapper {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    width: auto;
    max-width: 100%;
}

.comp-time-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    font-size: 12px;
    color: #868e96;
}

.comp-time-block {
    background-color: #f8f9fa;
    color: #343a40;
    min-width: 36px;
    width: auto;
    padding: 0 10px;
    height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    font-size: 16px;
    font-weight: 600;
    border: 1px solid #e9ecef;
    box-sizing: border-box;
    white-space: nowrap;
    margin-bottom: 4px;
}

@media (max-width: 340px) {
    .comp-timer-wrapper {
        gap: 5px;
    }
    
    .comp-time-block {
        min-width: 32px;
        padding: 0 8px;
        height: 32px;
        font-size: 14px;
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 初始化Bootstrap工具提示
    $('[data-toggle="tooltip"]').tooltip();
    
    function updateCountdown(timerElement) {
        const startTime = timerElement.dataset.startTime;
        const endTime = timerElement.dataset.endTime;
        const targetTime = startTime || endTime;
        
        if (!targetTime) return;

        function update() {
            const now = new Date().getTime();
            const target = new Date(targetTime).getTime();
            const distance = target - now;

            if (distance < 0) {
                location.reload();
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const daysEl = timerElement.querySelector('.days');
            const hoursEl = timerElement.querySelector('.hours');
            const minutesEl = timerElement.querySelector('.minutes');
            const secondsEl = timerElement.querySelector('.seconds');
            
            daysEl.textContent = String(days).padStart(2, '0');
            hoursEl.textContent = String(hours).padStart(2, '0');
            minutesEl.textContent = String(minutes).padStart(2, '0');
            secondsEl.textContent = String(seconds).padStart(2, '0');
            
            // 动态调整宽度以适应内容
            [daysEl, hoursEl, minutesEl, secondsEl].forEach(el => {
                el.style.width = 'auto';
                const text = el.textContent.trim();
                const textWidth = text.length;
                // 根据字符数动态设置最小宽度
                if (textWidth > 2) {
                    el.style.minWidth = (textWidth * 10 + 20) + 'px';
                } else {
                    el.style.minWidth = '36px';
                }
            });
        }

        update();
        return setInterval(update, 1000);
    }

    // 初始化宽度调整函数
    function adjustTimerWidths() {
        document.querySelectorAll('.comp-time-block').forEach(el => {
            el.style.width = 'auto';
            const text = el.textContent.trim();
            const textWidth = text.length;
            if (textWidth > 2) {
                el.style.minWidth = (textWidth * 10 + 20) + 'px';
            } else {
                el.style.minWidth = '36px';
            }
        });
    }
    
    // 页面加载时调整一次
    adjustTimerWidths();
    
    // 延迟调整，确保DOM完全渲染
    setTimeout(adjustTimerWidths, 100);
    
    document.querySelectorAll('.comp-timer-wrapper').forEach(timer => {
        updateCountdown(timer);
    });
});
</script>
